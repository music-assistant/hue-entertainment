# Lints and tests the library on every push to main and every pull request.
# https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Test with Pre-commit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code from GitHub
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip build setuptools
          pip install . .[test]
      - name: Lint with pre-commit
        # no-commit-to-branch is a local-only guard against committing to main; CI checks out
        # main, so it must be skipped here or it fails every push.
        run: SKIP=no-commit-to-branch pre-commit run --all-files
      - name: Type-check with mypy
        run: mypy hue_entertainment

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Check out code from GitHub
        uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip build setuptools
          pip install . .[test]
      - name: Run tests
        run: pytest
