name: Publish releases to PyPI

on:
  release:
    types: [published, prereleased]

jobs:
  build-and-publish-pypi:
    name: Builds and publishes releases to PyPI
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.vars.outputs.tag }}
    steps:
      - name: Resolve version from the release
        id: vars
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          # Use the release payload's tag (authoritative; GITHUB_REF is not reliably the tag on
          # a release event) and fail fast rather than build an invalid (non-PEP440) version.
          version="${TAG#v}"
          if [ -z "$version" ]; then
            echo "::error::Could not resolve a release version from the event tag '${TAG}'"
            exit 1
          fi
          echo "tag=${version}" >> "$GITHUB_OUTPUT"
      - name: Check out the released tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
      - name: Set up Python 3.10
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.10"
      - name: Install build
        run: >-
          pip install build tomli tomli-w
      - name: Set Python project version from tag
        shell: python
        env:
          VERSION: ${{ steps.vars.outputs.tag }}
        run: |-
          import os
          import tomli
          import tomli_w

          with open("pyproject.toml", "rb") as f:
            pyproject = tomli.load(f)

          pyproject["project"]["version"] = os.environ["VERSION"]

          with open("pyproject.toml", "wb") as f:
            tomli_w.dump(pyproject, f)
      - name: Build
        run: >-
          python3 -m build
      - name: Publish release to PyPI
        uses: pypa/gh-action-pypi-publish@v1.13.0
        with:
          user: __token__
          password: ${{ secrets.PYPI_TOKEN }}
